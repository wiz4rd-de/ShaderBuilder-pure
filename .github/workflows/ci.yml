name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: typecheck + production build. The built web/dist is also a build
  # input for the Rust `app` crate (Tauri's generate_context! embeds it), so it
  # is uploaded for the rust job to consume.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Rust: format, lint (warnings denied), tests, and the TypeScript-bindings
  # drift check. Needs the frontend build so the Tauri `app` crate compiles.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt + clippy + test + ts-drift)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download web/dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      # Tauri v2 Linux system dependencies (WebKitGTK 4.1 + friends) so the
      # `app` crate links.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            build-essential

      # rustup installs the toolchain + components pinned in rust-toolchain.toml.
      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # `cargo test` above regenerated the committed TypeScript bindings (the
      # ts-rs #[ts(export)] tests). If they differ from what's checked in, the
      # Rust schema and the TS bindings have drifted — fail the build.
      - name: TypeScript bindings drift check
        run: |
          git diff --exit-code -- web/src/bindings \
            || (echo "::error::web/src/bindings is stale — run 'cargo test -p core-model' and commit." && exit 1)
