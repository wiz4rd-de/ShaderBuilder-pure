name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: typecheck + production build. The built web/dist is also a build
  # input for the Rust `app` crate (Tauri's generate_context! embeds it), so it
  # is uploaded for the rust job to consume.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Upload web/dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Rust: format, lint (warnings denied), tests, and the TypeScript-bindings
  # drift check. Needs the frontend build so the Tauri `app` crate compiles.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (fmt + clippy + test + ts-drift)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download web/dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      # Tauri v2 Linux system dependencies (WebKitGTK 4.1 + friends) so the
      # `app` crate links, plus the toolchain the GPU/compile tests need:
      #   * glslang-tools — provides `glslangValidator`, the slang-compile backend;
      #   * mesa-vulkan-drivers — the lavapipe software Vulkan ICD wgpu renders on;
      #   * vulkan-tools — `vulkaninfo` for debugging adapter selection in logs.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            build-essential \
            glslang-tools \
            mesa-vulkan-drivers \
            vulkan-tools

      # Explicitly install the pinned toolchain *with* rustfmt + clippy. `rustup
      # show` alone is unreliable on the runner: auto-install uses the minimal
      # profile and skips the components listed in rust-toolchain.toml
      # (rust-lang/rustup#4337), which would break the fmt/clippy steps.
      - name: Install Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      # Force wgpu onto the lavapipe software-Vulkan adapter so the headless
      # GPU tests (incl. the `e2e_curvature` Phase-1 exit test) run on the
      # GPU-less runner. `Renderer::new` builds the instance via
      # `new_without_display_handle_from_env`, so these env vars are honored.
      - name: Test
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          WGPU_BACKEND: vulkan
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: cargo test --workspace --locked

      # Capture the rendered curvature snapshot (and passthrough control) the
      # e2e test writes, so a render regression is inspectable from the run.
      - name: Upload e2e render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-render-artifacts
          path: target/e2e-artifacts/
          if-no-files-found: warn
          retention-days: 7

      # `cargo test` above regenerated the committed TypeScript bindings (the
      # ts-rs #[ts(export)] tests). If they differ from what's checked in, the
      # Rust schema and the TS bindings have drifted — fail the build. Use
      # `git status --porcelain` so newly-added (untracked) and deleted binding
      # files are caught too, not just modifications.
      - name: TypeScript bindings drift check
        run: |
          if [ -n "$(git status --porcelain -- web/src/bindings)" ]; then
            echo "::error::web/src/bindings is stale — run 'cargo test -p core-model' and commit."
            git status --porcelain -- web/src/bindings
            git diff -- web/src/bindings
            exit 1
          fi
